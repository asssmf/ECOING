<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>ECOING</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
      tailwind.config = {
        theme: {
          extend: {
            animation: {
              'slide-down': 'slideDown 0.3s ease-out',
              'slide-up': 'slideUp 0.3s ease-out',
              'fadeIn': 'fadeIn 0.3s ease-out',
              'shake-crazy': 'shakeCrazy 0.2s infinite'
            },
            keyframes: {
              slideDown: { '0%': { transform: 'translateY(-10%)', opacity: '0' }, '100%': { transform: 'translateY(0)', opacity: '1' } },
              slideUp: { '0%': { transform: 'translateY(10%)', opacity: '0' }, '100%': { transform: 'translateY(0)', opacity: '1' } },
              fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
              shakeCrazy: { '0%, 100%': { transform: 'translateX(0)' }, '25%': { transform: 'translateX(5px)' }, '75%': { transform: 'translateX(-5px)' } }
            }
          }
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/main.jsx"></script>
  </body>
</html>
